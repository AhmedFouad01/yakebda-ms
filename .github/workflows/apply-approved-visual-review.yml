name: Apply Approved Visual Review

on:
  push:
    branches: [audit/system-wide-ui-consistency]
    paths:
      - tools/qa/apply-approved-visual-review.mjs
      - .github/workflows/apply-approved-visual-review.yml

permissions:
  contents: write

concurrency:
  group: ykms-approved-visual-review
  cancel-in-progress: true

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[approved-visual-review]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout approved branch
        uses: actions/checkout@v4
        with:
          ref: audit/system-wide-ui-consistency
          fetch-depth: 0

      - name: Apply approved UI changes
        run: node tools/qa/apply-approved-visual-review.mjs

      - name: Verify expected files changed
        shell: bash
        run: |
          git diff --exit-code --quiet -- apps/admin/src/pages/Reports.tsx && exit 1 || true
          git diff --exit-code --quiet -- apps/admin/src/pages/settings/crudSections.tsx && exit 1 || true
          git diff --exit-code --quiet -- apps/admin/src/pages/Pos.tsx && exit 1 || true
          git diff --exit-code --quiet -- apps/admin/src/final-closure.css && exit 1 || true

      - name: Remove one-time patch assets
        run: |
          rm tools/qa/apply-approved-visual-review.mjs
          rm .github/workflows/apply-approved-visual-review.yml

      - name: Commit approved visual review
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/admin/src/pages/Reports.tsx \
            apps/admin/src/pages/settings/crudSections.tsx \
            apps/admin/src/pages/Pos.tsx \
            apps/admin/src/final-closure.css \
            tools/qa/apply-approved-visual-review.mjs \
            .github/workflows/apply-approved-visual-review.yml
          git commit -m "fix(ui): apply approved responsive review [approved-visual-review]"
          git push origin HEAD:audit/system-wide-ui-consistency
