name: Apply global color tokens

on:
  push:
    branches: [refactor/global-color-tokens]
    paths:
      - scripts/apply_global_color_tokens.py
      - .github/workflows/apply-global-color-tokens.yml
  pull_request:
    branches: [refactor/pos-fast-rail]
    paths:
      - scripts/apply_global_color_tokens.py
      - .github/workflows/apply-global-color-tokens.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ykms
          POSTGRES_PASSWORD: ykms
          POSTGRES_DB: ykms_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ykms -d ykms_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_test
      TEST_DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_test
      JWT_SECRET: ci-only-change-me
      API_PORT: 3001
      CORS_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/global-color-tokens
          fetch-depth: 0
      - name: Apply token migration
        run: python scripts/apply_global_color_tokens.py
      - name: Remove temporary migration files
        run: rm scripts/apply_global_color_tokens.py .github/workflows/apply-global-color-tokens.yml
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run ui:colors:check
      - run: npm run api:test
      - run: npm run admin:build
      - name: Commit validated global color system
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "refactor(ui): centralize system colors in semantic theme tokens"
          git push origin HEAD:refactor/global-color-tokens
