name: Apply POS delivery checkout

on:
  push:
    branches: [feature/order-sources-price-lists]
    paths: [.github/workflows/apply-pos-delivery-checkout.yml]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/order-sources-price-lists
          fetch-depth: 0
      - name: Apply deterministic patch
        env:
          PATCH_B64: 
        run: |
          python - <<'PY'
          import base64, os, zlib
          exec(zlib.decompress(base64.b64decode(os.environ['PATCH_B64'])))
          PY
      - name: Commit applied changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-pos-delivery-checkout.yml
          git add -A
          git commit -m "feat(pos): add delivery customer, address, phone and zone checkout"
          git push origin HEAD:feature/order-sources-price-lists
