name: Apply POS QA Stage 2

on:
  push:
    branches:
      - ykms-02g-e-pos-operational-qa-fixes
    paths:
      - .github/workflows/apply-pos-qa-stage-2.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ykms
          POSTGRES_PASSWORD: ykms
          POSTGRES_DB: ykms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ykms -d ykms_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      TEST_DATABASE_URL: postgres://ykms:ykms@127.0.0.1:5432/ykms_test
      DATABASE_URL: postgres://ykms:ykms@127.0.0.1:5432/ykms_test
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ykms-02g-e-pos-operational-qa-fixes
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Apply source transformation
        run: python3 .github/scripts/apply_pos_qa_stage2.py
      - name: API tests
        run: npm run api:test
      - name: Admin build
        run: npm run admin:build
      - name: Commit validated stage
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-pos-qa-stage-2.yml .github/scripts/apply_pos_qa_stage2.py
          git add apps/admin/src/pages/Pos.tsx apps/admin/src/ykms-02f.css apps/admin/src/components/Receipt.tsx apps/admin/src/components/OrderDetail.tsx apps/api/src/modules/orders.ts
          git commit -m "fix(pos): align toolbar cards and visual order history"
          git push origin HEAD:ykms-02g-e-pos-operational-qa-fixes
