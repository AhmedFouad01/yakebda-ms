name: YAKEBDA MS CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ykms
          POSTGRES_PASSWORD: ykms
          POSTGRES_DB: ykms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ykms -d ykms_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_test
      TEST_DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_test
      JWT_SECRET: ci-only-change-me
      API_PORT: 3001
      CORS_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply security stabilization patch
        if: github.head_ref == 'fix/security-scope-stabilization'
        run: |
          python3 tools/patch_security_core.py
          python3 tools/patch_orders_security.py
          python3 tools/add_security_scope_regression.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: API tests
        run: npm run api:test

      - name: Admin build
        run: npm run admin:build

      - name: Validate diff
        if: github.head_ref == 'fix/security-scope-stabilization'
        run: git diff --check

      - name: Commit validated security implementation
        if: github.head_ref == 'fix/security-scope-stabilization'
        run: |
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f tools/patch_security_core.py
          rm -f tools/patch_orders_security.py
          rm -f tools/add_security_scope_regression.py
          rm -f .github/workflows/apply-security-scope-stabilization.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(security): enforce permissions and branch scope"
          git push origin HEAD:${{ github.head_ref }}
