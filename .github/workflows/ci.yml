name: YAKEBDA MS CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev, audit/system-wide-ui-consistency]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ykms
          POSTGRES_PASSWORD: ykms
          POSTGRES_DB: ykms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ykms -d ykms_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_test
      TEST_DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_test
      JWT_SECRET: ci-only-change-me
      API_PORT: 3001
      CORS_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: API typecheck
        run: npm --workspace @ykms/api run build 2>&1 | tee api-typecheck.log

      - name: Upload typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-typecheck-diagnostics
          path: api-typecheck.log

      - name: Migration idempotency
        run: |
          npm run api:migrate
          npm run api:migrate

      - name: API tests
        run: npm run api:test

      - name: Global color contract
        run: npm run ui:colors:check

      - name: Admin build
        run: npm run admin:build
