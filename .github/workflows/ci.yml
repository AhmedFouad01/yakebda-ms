name: YAKEBDA MS CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev, audit/system-wide-ui-consistency, temp/pos-patch-runner]

permissions:
  contents: write

jobs:
  apply-pos-correction:
    if: github.event_name == 'pull_request' && github.head_ref == 'feature/order-sources-price-lists'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/order-sources-price-lists
          fetch-depth: 0
      - name: Correct AppShell and cart layout
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('apps/admin/src/pages/Pos.tsx')
          text = path.read_text(encoding='utf-8')

          if 'const [cashTender, setCashTender]' not in text:
              print('POS correction already applied')
              raise SystemExit(0)

          def replace_required(old: str, new: str, label: str):
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one match, found {count}')
              text = text.replace(old, new, 1)

          replace_required(
              '  const [cashTender, setCashTender] = useState<number | null>(null);\n',
              '',
              'cash tender state',
          )
          replace_required(
              '''  const tenderSuggestions = useMemo(() => {
    if (total <= 0) return [] as number[];
    const exact = Math.round(total * 100) / 100;
    const roundUp = (step: number) => Math.ceil((exact + 0.0001) / step) * step;
    const middleStep = exact < 200 ? 50 : 100;
    const highStep = exact < 200 ? 100 : exact < 1000 ? 500 : 1000;
    const values = [exact, roundUp(middleStep), roundUp(highStep)];
    return values.filter((value, index) => values.findIndex((candidate) => Math.abs(candidate - value) < 0.01) === index).slice(0, 3);
  }, [total]);
  const selectedChange = cashTender == null ? 0 : Math.max(0, Math.round((cashTender - total) * 100) / 100);
''',
              '',
              'cash suggestion calculation',
          )

          old_portal = '''      {shellControlsRoot && createPortal(
        <div className="posx-shell-order-controls">
          <div className="seg dark posx-shell-order-types">
            {enabledOrderTypes.map((type) => (
              <button
                type="button"
                key={type}
                className={orderType === type ? "active" : ""}
                onClick={() => {
                  setOrderType(type);
                  setSourceId("");
                  setDeliveryZoneId("");
                  setDeliveryFee(0);
                  setCashTender(null);
                }}
              >
                {t.orders.types[type]}
              </button>
            ))}
          </div>
          <label className="posx-shell-source">
            <span>مصدر الطلب</span>
            <select value={sourceId} onChange={(event) => setSourceId(event.target.value)} aria-label="مصدر الطلب" required>
              <option value="">اختر مصدر الطلب…</option>
              {sources.map((source) => <option key={source.id} value={source.id}>{source.name_ar}</option>)}
            </select>
          </label>
        </div>,
        shellControlsRoot
      )}
'''
          new_portal = '''      {shellControlsRoot && createPortal(
        <div className="posx-shell-operation-controls">
          <span className={shift ? "posx-shift on" : "posx-shift off"}>
            <span>{me?.name ?? "الكاشير"}</span>
            <span>{shift ? t.shift.openTitle : t.shift.noShift}</span>
            {can("shifts.manage") && <button onClick={() => setAdminPanel("shift")}>{shift ? t.shift.close : t.shift.open}</button>}
          </span>
          <input
            className="posx-search"
            placeholder="ابحث باسم الصنف أو المكونات…"
            value={search}
            onChange={(event) => setSearch(event.target.value)}
          />
          <button className="posx-history-btn" onClick={() => setHistoryOpen(true)}>سجل الطلبات</button>
        </div>,
        shellControlsRoot
      )}
'''
          replace_required(old_portal, new_portal, 'AppShell portal')

          replace_required(
              '''            <span className={shift ? "posx-shift on" : "posx-shift off"}>
              <span>{me?.name ?? "الكاشير"}</span>
              <span>{shift ? t.shift.openTitle : t.shift.noShift}</span>
              {can("shifts.manage") && <button onClick={() => setAdminPanel("shift")}>{shift ? t.shift.close : t.shift.open}</button>}
            </span>
            <input className="posx-search" placeholder="ابحث باسم الصنف أو المكونات…" value={search} onChange={(e) => setSearch(e.target.value)} />
            <button className="posx-history-btn" onClick={() => setHistoryOpen(true)}>سجل الطلبات</button>
''',
              '',
              'duplicated operational toolbar controls',
          )

          order_context = '''            <div className="posx-order-context">
              <div className="seg dark">
                {enabledOrderTypes.map((type) => (
                  <button
                    type="button"
                    key={type}
                    className={orderType === type ? "active" : ""}
                    onClick={() => {
                      setOrderType(type);
                      setSourceId("");
                      setDeliveryZoneId("");
                      setDeliveryFee(0);
                    }}
                  >
                    {t.orders.types[type]}
                  </button>
                ))}
              </div>
              <label className="posx-source-field">
                <span>مصدر الطلب</span>
                <select value={sourceId} onChange={(event) => setSourceId(event.target.value)} aria-label="مصدر الطلب" required>
                  <option value="">اختر مصدر الطلب…</option>
                  {sources.map((source) => <option key={source.id} value={source.id}>{source.name_ar}</option>)}
                </select>
              </label>
            </div>
'''
          replace_required(
              '          <div className="posx-opts">\n',
              '          <div className="posx-opts">\n' + order_context,
              'cart order context',
          )
          replace_required(
              '                <button key={method} className={payment === method ? "active" : ""} onClick={() => { setPayment(method); setCashTender(null); }}>{paymentLabels[method] ?? method}</button>\n',
              '                <button key={method} className={payment === method ? "active" : ""} onClick={() => setPayment(method)}>{paymentLabels[method] ?? method}</button>\n',
              'payment method handler',
          )

          quick_panel = re.compile(
              r'            \{payment === "cash" && total > 0 && \(\n'
              r'              <div className="posx-change-panel">.*?'
              r'            \)\}\n',
              re.S,
          )
          text, count = quick_panel.subn('', text, count=1)
          if count != 1:
              raise SystemExit(f'quick-change panel: expected one match, found {count}')

          text = re.sub(r'^\s*setCashTender\(null\);\n', '', text, flags=re.M)
          if any(token in text for token in ('cashTender', 'tenderSuggestions', 'selectedChange', 'posx-change-panel')):
              raise SystemExit('quick-change experiment still present')
          if text.count('posx-shell-operation-controls') != 1 or text.count('posx-order-context') != 1:
              raise SystemExit('corrected POS layout contract not satisfied')

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit correction if needed
        run: |
          if git diff --quiet -- apps/admin/src/pages/Pos.tsx; then
            echo "No correction commit needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/admin/src/pages/Pos.tsx
          git diff --cached --check
          git commit -m "fix(pos): move shift tools to shell and restore cart context"
          git push origin HEAD:feature/order-sources-price-lists

  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ykms
          POSTGRES_PASSWORD: ykms
          POSTGRES_DB: ykms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ykms -d ykms_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_test
      TEST_DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_test
      JWT_SECRET: ci-only-change-me
      API_PORT: 3001
      CORS_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: API tests
        run: npm run api:test

      - name: Admin build
        run: npm run admin:build
