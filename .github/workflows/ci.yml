name: YAKEBDA MS CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev, audit/system-wide-ui-consistency]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ykms
          POSTGRES_PASSWORD: ykms
          POSTGRES_DB: ykms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ykms -d ykms_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_test
      TEST_DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_test
      JWT_SECRET: ci-only-change-me
      API_PORT: 3001
      CORS_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: API typecheck
        run: npm --workspace @ykms/api run build 2>&1 | tee api-typecheck.log

      - name: Upload typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-typecheck-diagnostics
          path: api-typecheck.log

      - name: Migration idempotency
        run: |
          npm run api:migrate
          npm run api:migrate

      - name: API tests
        run: npm run api:test 2>&1 | tee api-tests.log

      - name: Upload API test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-diagnostics
          path: api-tests.log

      - name: Global color contract
        run: npm run ui:colors:check

      - name: Admin tests
        run: npm run admin:test 2>&1 | tee admin-tests.log

      - name: Upload Admin test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: admin-test-diagnostics
          path: admin-tests.log

      - name: Admin build
        run: npm run admin:build

  p2-apply:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'refactor/p2-maintainability'
    runs-on: ubuntu-latest
    timeout-minutes: 95

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ykms
          POSTGRES_PASSWORD: ykms
          POSTGRES_DB: ykms_visual
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ykms -d ykms_visual"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_visual
      TEST_DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_visual
      JWT_SECRET: p2-visual-only-change-me
      API_PORT: 3001
      CORS_ORIGIN: http://127.0.0.1:5173
      P2_WEB_ORIGIN: http://127.0.0.1:5173
      P2_API_ORIGIN: http://127.0.0.1:3001
      P2_OWNER_EMAIL: owner@ykms.local
      P2_OWNER_PASSWORD: Owner@12345

    steps:
      - name: Checkout P2 branch
        uses: actions/checkout@v4
        with:
          ref: refactor/p2-maintainability
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Execute guarded P2 runner
        run: |
          set -o pipefail
          python - <<'PY' 2>&1 | tee /tmp/p2-run.log
          from pathlib import Path
          import os
          import re
          import subprocess

          lines = Path('.github/workflows/p2-apply-maintainability.yml').read_text().splitlines()
          steps = []
          current_name = 'unnamed'
          index = 0
          while index < len(lines):
              line = lines[index]
              if line.startswith('      - name: '):
                  current_name = line.split(': ', 1)[1]
              if line == '        run: |':
                  index += 1
                  block = []
                  while index < len(lines) and not lines[index].startswith('      - name: '):
                      body_line = lines[index]
                      block.append(body_line[10:] if body_line.startswith('          ') else body_line)
                      index += 1
                  script = '\n'.join(block).rstrip() + '\n'
                  script = script.replace(
                      'npm run admin:dev -- --host 127.0.0.1',
                      'npm --workspace @ykms/admin run dev -- --host 127.0.0.1',
                  )
                  script = script.replace(
                      'http://127.0.0.1:3001/health',
                      'http://127.0.0.1:3001/api/v1/health',
                  )
                  script = script.replace(
                      "assert data['css_imports'] == 3, data",
                      "assert data['css_imports'] <= 3, data",
                  )
                  script = script.replace(
                      '- CSS authority: `app.css`, `pos.css`, then final `global-colors.css`.',
                      '- CSS authority: consolidated `theme.css`, then final `global-colors.css`.',
                  )
                  if current_name == 'Reconstruct and verify transformation script':
                      script += r'''
python - <<'P2PATCH'
from pathlib import Path

path = Path('/tmp/p2-apply-maintainability.py')
text = path.read_text()

layers_start = text.index('def stage_layers():')
layers_end = text.index('\ndef stage_important', layers_start)
new_layers = r'''def stage_layers():
    main = SRC / "main.tsx"
    text = main.read_text()
    imports = []
    for line in text.splitlines():
        match = re.fullmatch(r'import "\./([^\"]+\.css)";', line.strip())
        if match:
            imports.append(match.group(1))
    assert len(imports) == 18, imports
    assert "theme.css" in imports
    assert imports[-1] == "global-colors.css"

    chunks = ["/* YAKEBDA MS consolidated stylesheet — original cascade order preserved. */\n"]
    hoisted_imports = []
    for name in imports[:-1]:
        content = (SRC / name).read_text().rstrip()
        for found in re.findall(r'(?m)^@import\s+[^;]+;\s*$', content):
            hoisted_imports.append(found.strip())
        content = re.sub(r'(?m)^@import\s+[^;]+;\s*\n?', '', content)
        chunks.append(f"\n/* ===== migrated from {name} ===== */\n{content}\n")

    combined = "\n".join(dict.fromkeys(hoisted_imports))
    if combined:
        combined += "\n\n"
    combined += "".join(chunks)
    (SRC / "theme.css").write_text(combined)

    remaining = []
    for line in text.splitlines():
        if re.fullmatch(r'import "\./[^\"]+\.css";', line.strip()):
            continue
        remaining.append(line)
    new_text = "\n".join(remaining) + "\n"
    needle = 'import { initializeTheme } from "./lib/theme";\n'
    assert needle in new_text
    new_text = new_text.replace(
        needle,
        needle + 'import "./theme.css";\nimport "./global-colors.css";\n',
        1,
    )
    main.write_text(new_text)

    for name in imports[:-1]:
        if name != "theme.css":
            (SRC / name).unlink()

'''
text = text[:layers_start] + new_layers + text[layers_end:]

important_start = text.index('def stage_important():')
important_end = text.index('\ndef controller_names', important_start)
new_important = r'''def stage_important():
    p = SRC / "theme.css"
    s = p.read_text().replace(" !important", "").replace("!important", "")
    s = s.replace("    left: 9px;", "    inset-inline-end: 9px;", 1)
    s = s.replace("    right: 9px;", "    inset-inline-start: 9px;", 1)
    replacements = [
        ("  right: auto;\n  bottom: auto;\n  left: auto;", "  inset-inline: auto;\n  bottom: auto;", 1),
        ("  left: 12px;", "  inset-inline-end: 12px;", 1),
        ("  right: 12px;\n  left: auto;", "  inset-inline-start: 12px;\n  inset-inline-end: auto;", 1),
        ("    left: 0;\n    right: auto;", "    inset-inline-start: 0;\n    inset-inline-end: auto;", 1),
        ("    right: 0;\n    bottom: 0;\n    left: 0;", "    inset-inline: 0;\n    bottom: 0;", 1),
        ("text-align: right;", "text-align: start;", 999),
        ("text-align: left;", "text-align: end;", 999),
        ("@keyframes uif-drawer-in { from { transform: translateX(-24px); opacity: 0.4; }", "@keyframes uif-drawer-in { from { transform: translateX(24px); opacity: 0.4; }", 1),
        ("    box-shadow: 16px 0 44px rgba(0, 0, 0, 0.58);\n    transform: translateX(-105%);", "    box-shadow: -16px 0 44px rgba(0, 0, 0, 0.58);\n    transform: translateX(105%);", 1),
    ]
    for old, new, count in replacements:
        assert old in s, old
        s = s.replace(old, new, count)
    p.write_text(s)

'''
text = text[:important_start] + new_important + text[important_end:]
path.write_text(text)
P2PATCH
python -m py_compile /tmp/p2-apply-maintainability.py
'''
                  script = re.sub(
                      r'(?m)^(git commit -m "[^"]+")$',
                      r'\1\ngit push origin HEAD:refactor/p2-maintainability',
                      script,
                  )
                  steps.append((current_name, script))
                  continue
              index += 1

          if not steps:
              raise RuntimeError('No run blocks found in P2 workflow')

          for name, script in steps:
              print(f'\n===== {name} =====', flush=True)
              subprocess.run(
                  ['bash', '-euo', 'pipefail', '-c', script],
                  check=True,
                  env=os.environ.copy(),
              )
          PY

      - name: Restore normal CI and remove temporary workflows
        if: success()
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/ci.yml')
          text = path.read_text()
          text = text.replace('\npermissions:\n  contents: write\n', '', 1)
          text = text.split('\n  p2-apply:\n', 1)[0].rstrip() + '\n'
          path.write_text(text)
          PY
          git config user.name "YAKEBDA P2 Automation"
          git config user.email "actions@users.noreply.github.com"
          git rm -f .github/workflows/p2-enable-apply.yml || true
          git add .github/workflows/ci.yml
          git commit -m "chore(p2): restore normal CI after guarded execution"
          git push origin HEAD:refactor/p2-maintainability

      - name: Upload P2 parity diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p2-maintainability-parity
          path: |
            /tmp/p2-visual
            docs/engineering/visual-baseline/p2-after
            docs/engineering/P2_FINAL_METRICS.json
            /tmp/p2-api.log
            /tmp/p2-admin.log
            /tmp/p2-run.log
          if-no-files-found: warn
          retention-days: 14
