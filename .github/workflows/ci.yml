name: YAKEBDA MS CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev, audit/system-wide-ui-consistency]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ykms
          POSTGRES_PASSWORD: ykms
          POSTGRES_DB: ykms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ykms -d ykms_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_test
      TEST_DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_test
      JWT_SECRET: ci-only-change-me
      API_PORT: 3001
      CORS_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: API typecheck
        run: npm --workspace @ykms/api run build 2>&1 | tee api-typecheck.log

      - name: Upload typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-typecheck-diagnostics
          path: api-typecheck.log

      - name: Migration idempotency
        run: |
          npm run api:migrate
          npm run api:migrate

      - name: API tests
        run: npm run api:test 2>&1 | tee api-tests.log

      - name: Upload API test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-diagnostics
          path: api-tests.log

      - name: Global color contract
        run: npm run ui:colors:check

      - name: Admin tests
        run: npm run admin:test 2>&1 | tee admin-tests.log

      - name: Upload Admin test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: admin-test-diagnostics
          path: admin-tests.log

      - name: Admin build
        run: npm run admin:build

  p2-apply:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'refactor/p2-maintainability'
    runs-on: ubuntu-latest
    timeout-minutes: 95

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ykms
          POSTGRES_PASSWORD: ykms
          POSTGRES_DB: ykms_visual
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ykms -d ykms_visual"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_visual
      TEST_DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_visual
      JWT_SECRET: p2-visual-only-change-me
      API_PORT: 3001
      CORS_ORIGIN: http://127.0.0.1:5173
      P2_WEB_ORIGIN: http://127.0.0.1:5173
      P2_API_ORIGIN: http://127.0.0.1:3001
      P2_OWNER_EMAIL: owner@ykms.local
      P2_OWNER_PASSWORD: Owner@12345

    steps:
      - name: Checkout P2 branch
        uses: actions/checkout@v4
        with:
          ref: refactor/p2-maintainability
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Execute guarded P2 runner
        run: |
          python -m pip install --disable-pip-version-check pyyaml
          python - <<'PY'
          from pathlib import Path
          import os
          import subprocess
          import yaml

          workflow = yaml.safe_load(Path('.github/workflows/p2-apply-maintainability.yml').read_text())
          steps = workflow['jobs']['apply']['steps']
          for step in steps:
              script = step.get('run')
              if not script:
                  continue
              name = step.get('name', 'unnamed')
              print(f'\n===== {name} =====', flush=True)
              subprocess.run(
                  ['bash', '-euo', 'pipefail', '-c', script],
                  check=True,
                  env=os.environ.copy(),
              )
          PY

      - name: Restore normal CI and remove temporary workflows
        if: success()
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/ci.yml')
          text = path.read_text()
          text = text.replace('\npermissions:\n  contents: write\n', '', 1)
          text = text.split('\n  p2-apply:\n', 1)[0].rstrip() + '\n'
          path.write_text(text)
          PY
          git config user.name "YAKEBDA P2 Automation"
          git config user.email "actions@users.noreply.github.com"
          git rm -f .github/workflows/p2-enable-apply.yml || true
          git add .github/workflows/ci.yml
          git commit -m "chore(p2): restore normal CI after guarded execution"
          git push origin HEAD:refactor/p2-maintainability

      - name: Upload P2 parity diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p2-maintainability-parity
          path: |
            /tmp/p2-visual
            docs/engineering/visual-baseline/p2-after
            docs/engineering/P2_FINAL_METRICS.json
            /tmp/p2-api.log
            /tmp/p2-admin.log
          if-no-files-found: warn
          retention-days: 14
