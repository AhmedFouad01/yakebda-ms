name: YAKEBDA MS CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ykms
          POSTGRES_PASSWORD: ykms
          POSTGRES_DB: ykms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ykms -d ykms_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_test
      TEST_DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_test
      JWT_SECRET: ci-only-change-me
      API_PORT: 3001
      CORS_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refactor/order-pricing-source

      - name: Apply POS quote wiring
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("apps/admin/src/pages/Pos.tsx")
          text = path.read_text(encoding="utf-8")
          if "interface OrderQuoteSummary" in text:
              raise SystemExit(0)

          def replace_once(old: str, new: str, label: str):
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              text = text.replace(old, new, 1)

          old = "  require_address_for_delivery: boolean;\n}\ninterface CartLine {"
          new = "\n".join([
              "  require_address_for_delivery: boolean;",
              "}",
              "interface OrderQuoteSummary {",
              "  subtotal: number;",
              "  discount: number;",
              "  delivery_fee: number;",
              "  service_fee: number;",
              "  vat_amount: number;",
              "  rounding_adjustment: number;",
              "  total: number;",
              "}",
              "interface CartLine {",
          ])
          replace_once(old, new, "quote interface")

          replace_once(
              "  const [busy, setBusy] = useState(false);\n  const [historyOpen, setHistoryOpen] = useState(false);",
              "\n".join([
                  "  const [busy, setBusy] = useState(false);",
                  "  const [quoteState, setQuoteState] = useState<{ key: string; data: OrderQuoteSummary } | null>(null);",
                  "  const [quoteBusy, setQuoteBusy] = useState(false);",
                  "  const [quoteError, setQuoteError] = useState(\"\");",
                  "  const [historyOpen, setHistoryOpen] = useState(false);",
              ]),
              "quote state",
          )

          first_effect = "  useEffect(() => {\n    api<{ data: Branch[] }>(\"/branches\").then((response) => {"
          quote_block = "\n".join([
              "  const quotePayload = useMemo(() => ({",
              "    branch_id: branchId,",
              "    order_type: orderType,",
              "    delivery_fee: orderType === \"delivery\" ? deliveryFee : 0,",
              "    discount: settings?.allow_discounts ? discount : 0,",
              "    discount_reason: discount > 0 ? discountReason || null : null,",
              "    items: cart.map((line) => ({",
              "      product_id: line.product.id,",
              "      variant_id: line.variant?.id ?? null,",
              "      qty: line.qty,",
              "      notes: line.notes || null,",
              "      modifier_ids: line.modifiers.map((modifier) => modifier.id),",
              "    })),",
              "  }), [branchId, orderType, deliveryFee, discount, discountReason, settings?.allow_discounts, cart]);",
              "  const quoteKey = useMemo(() => JSON.stringify(quotePayload), [quotePayload]);",
              "  const currentQuote = quoteState?.key === quoteKey ? quoteState.data : null;",
              "",
              "  useEffect(() => {",
              "    if (!branchId || !cart.length) {",
              "      setQuoteState(null);",
              "      setQuoteBusy(false);",
              "      setQuoteError(\"\");",
              "      return;",
              "    }",
              "    let cancelled = false;",
              "    setQuoteBusy(true);",
              "    setQuoteError(\"\");",
              "    const timer = window.setTimeout(() => {",
              "      api<{ data: OrderQuoteSummary }>(\"/orders/quote\", { method: \"POST\", body: quotePayload })",
              "        .then((response) => {",
              "          if (!cancelled) setQuoteState({ key: quoteKey, data: response.data });",
              "        })",
              "        .catch((e: Error) => {",
              "          if (!cancelled) {",
              "            setQuoteState(null);",
              "            setQuoteError(e.message);",
              "          }",
              "        })",
              "        .finally(() => {",
              "          if (!cancelled) setQuoteBusy(false);",
              "        });",
              "    }, 200);",
              "    return () => {",
              "      cancelled = true;",
              "      window.clearTimeout(timer);",
              "    };",
              "  }, [branchId, cart.length, quoteKey, quotePayload]);",
              "",
          ])
          replace_once(first_effect, quote_block + first_effect, "quote effect")

          start_marker = "  const subtotal = cart.reduce((sum, line) => sum + unitPrice(line) * line.qty, 0);"
          end_marker = "  total = Math.round(total * 100) / 100;"
          start = text.find(start_marker)
          end = text.find(end_marker, start)
          if start < 0 or end < 0:
              raise SystemExit("totals source markers not found")
          end += len(end_marker)
          totals_block = "\n".join([
              "  const localSubtotal = cart.reduce((sum, line) => sum + unitPrice(line) * line.qty, 0);",
              "  const subtotal = currentQuote?.subtotal ?? localSubtotal;",
              "  // أنواع الطلب من الإعدادات، بينما كل القيم المالية النهائية تأتي من server quote.",
              "  const enabledOrderTypes = ([\"takeaway\", \"delivery\"] as const).filter((type) =>",
              "    type === \"takeaway\" ? settings?.order_type_takeaway_enabled !== false : settings?.order_type_delivery_enabled !== false",
              "  );",
              "  const activeDeliveryFee = currentQuote?.delivery_fee ?? (orderType === \"delivery\" ? deliveryFee : 0);",
              "  const serviceFeeEstimate = currentQuote?.service_fee ?? 0;",
              "  const vatEstimate = currentQuote?.vat_amount ?? 0;",
              "  const total = currentQuote?.total ?? 0;",
          ])
          text = text[:start] + totals_block + text[end:]

          replace_once(
              "    if (!cart.length || busy) return;",
              "    if (!cart.length || busy || !currentQuote) return;",
              "fire quote guard",
          )
          replace_once(
              '            {discount > 0 && <div className="receipt-row"><span>{t.pos.discount}</span><span>{money(discount)}</span></div>}',
              '            {(currentQuote?.discount ?? discount) > 0 && <div className="receipt-row"><span>{t.pos.discount}</span><span>{money(currentQuote?.discount ?? discount)}</span></div>}',
              "discount display",
          )
          replace_once(
              '            {orderType === "delivery" && deliveryFee > 0 && <div className="receipt-row"><span>{t.pos.deliveryFee}</span><span>{money(deliveryFee)}</span></div>}',
              '            {orderType === "delivery" && activeDeliveryFee > 0 && <div className="receipt-row"><span>{t.pos.deliveryFee}</span><span>{money(activeDeliveryFee)}</span></div>}',
              "delivery display",
          )
          replace_once(
              '            <div className="receipt-row posx-total"><span>{t.pos.total}</span><span>{money(total)}</span></div>',
              '            <div className="receipt-row posx-total"><span>{t.pos.total}</span><span>{quoteBusy && !currentQuote ? "…" : money(total)}</span></div>',
              "total display",
          )

          old_reason = "\n".join([
              "            const fireReason = !cart.length",
              '              ? "السلة فارغة"',
              "              : deliveryIncomplete",
          ])
          new_reason = "\n".join([
              "            const fireReason = !cart.length",
              '              ? "السلة فارغة"',
              "              : quoteError",
              "                ? quoteError",
              "                : quoteBusy || !currentQuote",
              '                  ? "جاري حساب الإجمالي"',
              "                  : deliveryIncomplete",
          ])
          replace_once(old_reason, new_reason, "quote fire reason")

          path.write_text(text, encoding="utf-8")
          PY

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: API tests
        run: npm run api:test

      - name: Admin build
        run: npm run admin:build

      - name: Commit validated POS wiring and restore CI
        if: success()
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/admin/src/pages/Pos.tsx .github/workflows/ci.yml
          git diff --cached --quiet || git commit -m "refactor(pos): use authoritative server quotes"
          git push origin HEAD:refactor/order-pricing-source
