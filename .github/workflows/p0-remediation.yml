          import { Knex } from "knex";
          import { syncPermissionCatalog } from "../seedData";

          const GRANTS: Record<string, string[]> = {
            "settings.view": ["owner", "admin", "manager"],
            "customers.view": ["owner", "admin", "manager"],
          };

          export async function up(db: Knex): Promise<void> {
            await syncPermissionCatalog(db);

            for (const [permissionKey, roleKeys] of Object.entries(GRANTS)) {
              const roles = await db("roles")
                .where({ is_system: true })
                .whereIn("key", roleKeys);

              for (const role of roles) {
                await db("role_permissions")
                  .insert({ role_id: role.id, permission_key: permissionKey })
                  .onConflict(["role_id", "permission_key"])
                  .ignore();
              }
            }
          }

          export async function down(db: Knex): Promise<void> {
            const keys = Object.keys(GRANTS);
            await db("role_permissions").whereIn("permission_key", keys).del();
            await db("permissions").whereIn("key", keys).del();
          }
          EOF

