      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck API
        run: npm --workspace @ykms/api run build

      - name: Run migrations on a fresh test database
        run: |
          npm run api:migrate
          npm run api:migrate

      - name: Run API tests
        run: npm run api:test -- --fileParallelism=false

      - name: Validate admin build and color contract
        run: |
          npm run ui:colors:check
          npm run admin:build

      - name: Verify checkpoint history
        run: |
          test "$(git rev-list --count "$BASE_SHA"..HEAD)" -eq 4
          git log --oneline "$BASE_SHA"..HEAD

      - name: Publish four verified checkpoints
        run: |
          git push origin HEAD:refs/heads/"$TARGET_BRANCH" \
            --force-with-lease=refs/heads/"$TARGET_BRANCH":"$GITHUB_SHA"
