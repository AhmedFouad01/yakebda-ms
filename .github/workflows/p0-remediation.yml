name: P0 security and finance remediation

on:
  push:
    branches:
      - fix/p0-security-finance
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  remediate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ykms
          POSTGRES_PASSWORD: ykms
          POSTGRES_DB: ykms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ykms -d ykms_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_test
      TEST_DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_test
      JWT_SECRET: p0-ci-only-secret
      API_PORT: 3001
      CORS_ORIGIN: http://localhost:5173
      BASE_SHA: d52ab28c928e57a75aff249f57032f18f379f27f
      TARGET_BRANCH: fix/p0-security-finance

    steps:
      - name: Checkout bootstrap branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Reset to verified main and configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$TARGET_BRANCH" "$BASE_SHA"

      - name: R1 payment record-time integrity
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise SystemExit(f"{path}: expected one match, found {text.count(old)}")
              p.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "apps/api/src/i18n/ar.ts",
              '    payment_method_disabled: "طريقة الدفع هذه غير مفعلة في الإعدادات.",\n',
              '    payment_method_disabled: "طريقة الدفع هذه غير مفعلة في الإعدادات.",\n'
              '    payment_amount_positive: "مبلغ الدفع يجب أن يكون أكبر من صفر.",\n'
              '    payment_already_paid: "الطلب مدفوع بالكامل بالفعل.",\n'
              '    payment_over_remaining: "المبلغ يتجاوز المتبقّي على الطلب.",\n'
              '    unpaid_amount_zero: "مبلغ حالة غير مدفوع يجب أن يكون صفرًا.",\n'
          )

          old = '''      const id = newId();
                await db("payments").insert({
                  id,
                  order_id: order.id,
                  branch_id: order.branch_id,
                  method: body.data.method,
                  amount: body.data.amount,
                  received_by: req.user!.id,
                  shift_id: shiftId,
                });'''
          new = '''      const id = newId();
                await db.transaction(async (trx) => {
                  const paymentOrder = await trx("orders")
                    .where({ id: order.id, account_id: req.user!.accountId })
                    .select("total")
                    .forUpdate()
                    .first();
                  if (!paymentOrder) throw err.notFound();

                  // Read the payment sum only after the order-row lock is acquired.
                  // A waiting concurrent transaction then gets a fresh READ COMMITTED snapshot.
                  const [{ paid_amount: paidAmount }] = await trx("payments")
                    .where({ order_id: order.id })
                    .whereNot("method", "unpaid")
                    .sum("amount as paid_amount");

                  const total = Number(paymentOrder.total ?? 0);
                  const paid = Number(paidAmount ?? 0);
                  const amount = body.data.amount;
                  const epsilon = 0.001;

                  if (body.data.method === "unpaid") {
                    if (Math.abs(amount) > epsilon) {
                      throw err.validation({ amount: ar.errors.unpaid_amount_zero });
                    }
                  } else {
                    if (amount <= 0) {
                      throw err.validation({ amount: ar.errors.payment_amount_positive });
                    }
                    if (paid + epsilon >= total) {
                      throw err.validation({ amount: ar.errors.payment_already_paid });
                    }
                    if (paid + amount > total + epsilon) {
                      throw err.validation({ amount: ar.errors.payment_over_remaining });
                    }
                  }

                  await trx("payments").insert({
                    id,
                    order_id: order.id,
                    branch_id: order.branch_id,
                    method: body.data.method,
                    amount,
                    received_by: req.user!.id,
                    shift_id: shiftId,
                  });
                });'''
          replace_once("apps/api/src/modules/orders.ts", old, new)
          PY

          cat > apps/api/tests/payment-integrity.test.ts <<'EOF'
          import { afterAll, beforeAll, describe, expect, it } from "vitest";
          import request from "supertest";
          import { createApp } from "../src/app";
          import { config } from "../src/config";
          import { makeKnex } from "../src/db/knex";
          import { seedFoundation } from "../src/db/seedData";
          import { newId } from "../src/lib/ids";

          const db = makeKnex(config.testDatabaseUrl);
          let app: ReturnType<typeof createApp>;
          let ownerToken = "";
          let branchId = "";
          let sourceId = "";
          let productId = "";

          const auth = () => ({ Authorization: `Bearer ${ownerToken}` });

          async function createUnpaidOrder() {
            const response = await request(app)
              .post("/api/v1/orders")
              .set(auth())
              .send({
                branch_id: branchId,
                source_id: sourceId,
                order_type: "takeaway",
                delivery_fee: 0,
                discount: 0,
                submit: true,
                payment_method: "unpaid",
                items: [{ product_id: productId, qty: 1, modifier_ids: [] }],
              });
            expect(response.status).toBe(201);
            return response.body.data as { id: string; total: string | number };
          }

          function pay(orderId: string, amount: number, method: "cash" | "card" | "wallet" | "unpaid" = "card") {
            return request(app)
              .post(`/api/v1/orders/${orderId}/payments`)
              .set(auth())
              .send({ method, amount });
          }

          beforeAll(async () => {
            await db.migrate.rollback(undefined, true);
            await db.migrate.latest();
            const seed = await seedFoundation(db);
            branchId = seed.branchId;
            app = createApp(db);

            const login = await request(app)
              .post("/api/v1/auth/login")
              .send({ email: seed.ownerEmail, password: seed.ownerPassword });
            ownerToken = login.body.token;

            sourceId = (await db("order_sources")
              .where({ account_id: seed.accountId, code: "direct" })
              .first()).id;

            const categoryId = newId();
            productId = newId();
            await db("categories").insert({
              id: categoryId,
              account_id: seed.accountId,
              name_ar: "سلامة المدفوعات",
              sort_order: 95,
              is_active: true,
            });
            await db("products").insert({
              id: productId,
              account_id: seed.accountId,
              category_id: categoryId,
              name_ar: "صنف اختبار الدفع",
              base_price: 30,
              sort_order: 0,
              is_active: true,
            });
          });

          afterAll(async () => {
            await db.destroy();
          });

          describe("Payment record-time integrity", () => {
            it("accepts the exact remaining total and rejects a duplicate payment", async () => {
              const order = await createUnpaidOrder();
              const total = Number(order.total);

              const first = await pay(order.id, total);
              expect(first.status).toBe(201);

              const second = await pay(order.id, total);
              expect(second.status).toBe(422);
              expect(second.body.details.amount).toContain("مدفوع بالكامل");

              const [{ paid }] = await db("payments")
                .where({ order_id: order.id })
                .whereNot("method", "unpaid")
                .sum("amount as paid");
              expect(Number(paid)).toBe(total);
            });

            it("rejects zero-value real payments", async () => {
              const order = await createUnpaidOrder();
              const response = await pay(order.id, 0, "card");
              expect(response.status).toBe(422);
              expect(response.body.details.amount).toContain("أكبر من صفر");
            });

            it("rejects overpayment above the remaining amount", async () => {
              const order = await createUnpaidOrder();
              const response = await pay(order.id, Number(order.total) + 1);
              expect(response.status).toBe(422);
              expect(response.body.details.amount).toContain("المتبقّي");
            });

            it("supports partial payment followed by exact completion", async () => {
              const order = await createUnpaidOrder();
              const total = Number(order.total);

              const partial = await pay(order.id, 10);
              expect(partial.status).toBe(201);

              const complete = await pay(order.id, total - 10);
              expect(complete.status).toBe(201);

              const duplicate = await pay(order.id, 1);
              expect(duplicate.status).toBe(422);

              const [{ paid }] = await db("payments")
                .where({ order_id: order.id })
                .whereNot("method", "unpaid")
                .sum("amount as paid");
              expect(Number(paid)).toBe(total);
            });

            it("serializes concurrent full-payment attempts", async () => {
              const order = await createUnpaidOrder();
              const total = Number(order.total);

              const responses = await Promise.all([
                pay(order.id, total),
                pay(order.id, total),
              ]);
              expect(responses.map((response) => response.status).sort()).toEqual([201, 422]);

              const [{ paid }] = await db("payments")
                .where({ order_id: order.id })
                .whereNot("method", "unpaid")
                .sum("amount as paid");
              expect(Number(paid)).toBe(total);
            });

            it("keeps unpaid markers zero-valued", async () => {
              const order = await createUnpaidOrder();
              const response = await pay(order.id, 1, "unpaid");
              expect(response.status).toBe(422);
              expect(response.body.details.amount).toContain("صفر");
            });
          });
          EOF

          git add apps/api/src/modules/orders.ts apps/api/src/i18n/ar.ts apps/api/tests/payment-integrity.test.ts
          git commit -m "fix(payments): enforce record-time payment integrity"

      - name: R2 preserve existing atomic numbering invariant
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path("apps/api/tests/order-numbering.test.ts")
          text = path.read_text(encoding="utf-8")
          marker = 'describe("Atomic order numbering", () => {\n'
          addition = '''describe("Atomic order numbering", () => {
            it("keeps the database advisory-lock allocator installed", async () => {
              const result = await db.raw(`
                select
                  pg_get_triggerdef(t.oid) as trigger_def,
                  pg_get_functiondef(p.oid) as function_def
                from pg_trigger t
                join pg_proc p on p.oid = t.tgfoid
                where t.tgname = 'orders_assign_number_before_insert'
                  and not t.tgisinternal
              `);

              expect(result.rows).toHaveLength(1);
              expect(result.rows[0].trigger_def).toContain("BEFORE INSERT");
              expect(result.rows[0].function_def).toContain("pg_advisory_xact_lock");
              expect(result.rows[0].function_def).toContain("v_numbering_key");
            });

          '''
          if text.count(marker) != 1:
              raise SystemExit(f"order-numbering marker count: {text.count(marker)}")
          path.write_text(text.replace(marker, addition, 1), encoding="utf-8")
          PY

          git add apps/api/tests/order-numbering.test.ts
          git commit -m "test(orders): preserve advisory-lock numbering invariant"

      - name: R3 auth rate limiting lockout and failure audit
        run: |
          cat > apps/api/src/db/migrations/20260713_015_auth_lockout.ts <<'EOF'
          import { Knex } from "knex";

          export async function up(db: Knex): Promise<void> {
            const hasFailedCount = await db.schema.hasColumn("users", "failed_login_count");
            const hasLockedUntil = await db.schema.hasColumn("users", "locked_until");

            await db.schema.alterTable("users", (table) => {
              if (!hasFailedCount) {
                table.integer("failed_login_count").notNullable().defaultTo(0);
              }
              if (!hasLockedUntil) {
                table.timestamp("locked_until", { useTz: true }).nullable();
              }
            });
          }

          export async function down(db: Knex): Promise<void> {
            const hasFailedCount = await db.schema.hasColumn("users", "failed_login_count");
            const hasLockedUntil = await db.schema.hasColumn("users", "locked_until");

            await db.schema.alterTable("users", (table) => {
              if (hasLockedUntil) table.dropColumn("locked_until");
              if (hasFailedCount) table.dropColumn("failed_login_count");
            });
          }
          EOF

          cat > apps/api/src/modules/auth.ts <<'EOF'
          import { Request, Router } from "express";
          import bcrypt from "bcryptjs";
          import { z } from "zod";
          import { Knex } from "knex";
          import { err } from "../lib/errors";
          import { writeAudit } from "../lib/audit";
          import { loadUser, requireUser, signUserToken } from "../middleware/auth";
          import { ar } from "../i18n/ar";

          type RateBucket = {
            count: number;
            resetAt: number;
          };

          function positiveEnv(name: string, fallback: number): number {
            const value = Number(process.env[name]);
            return Number.isFinite(value) && value > 0 ? Math.floor(value) : fallback;
          }

          function lockDate(value: unknown): Date | null {
            if (!value) return null;
            const date = value instanceof Date ? value : new Date(String(value));
            return Number.isNaN(date.getTime()) ? null : date;
          }

          export function authRoutes(db: Knex): Router {
            const router = Router();
            const rateBuckets = new Map<string, RateBucket>();

            const rateMax = () => positiveEnv("AUTH_RATE_LIMIT_MAX", 10);
            const rateWindowMs = () => positiveEnv("AUTH_RATE_LIMIT_WINDOW_MS", 5 * 60 * 1000);
            const lockThreshold = () => positiveEnv("AUTH_LOCKOUT_THRESHOLD", 5);
            const lockWindowMs = () => positiveEnv("AUTH_LOCKOUT_MS", 15 * 60 * 1000);

            function assertRateAllowed(key: string): void {
              const now = Date.now();
              const current = rateBuckets.get(key);
              if (!current) return;
              if (current.resetAt <= now) {
                rateBuckets.delete(key);
                return;
              }
              if (current.count >= rateMax()) {
                throw err.rateLimited({ retry_after_ms: current.resetAt - now });
              }
            }

            function noteRateFailure(key: string): void {
              const now = Date.now();
              const current = rateBuckets.get(key);
              if (!current || current.resetAt <= now) {
                rateBuckets.set(key, { count: 1, resetAt: now + rateWindowMs() });
                return;
              }
              current.count += 1;
            }

            function clearRateFailures(key: string): void {
              rateBuckets.delete(key);
            }

            async function auditFailure(entry: {
              action: "auth.login_failed" | "auth.pin_failed";
              req: Request;
              accountId?: string | null;
              branchId?: string | null;
              userId?: string | null;
              reason: string;
            }): Promise<void> {
              await writeAudit(db, {
                accountId: entry.accountId ?? null,
                branchId: entry.branchId ?? null,
                userId: entry.userId ?? null,
                action: entry.action,
                meta: { reason: entry.reason },
                ip: entry.req.ip,
              });
            }

            router.post("/login", async (req, res, next) => {
              try {
                const body = z
                  .object({ email: z.string().email(), password: z.string().min(1) })
                  .safeParse(req.body);
                if (!body.success) throw err.validation(body.error.flatten());

                const email = body.data.email.trim().toLowerCase();
                const rateKey = `login:${req.ip}:${email}`;
                assertRateAllowed(rateKey);

                const userRow = await db("users")
                  .whereRaw("lower(email) = ?", [email])
                  .where({ is_active: true })
                  .first();

                if (!userRow?.password_hash) {
                  noteRateFailure(rateKey);
                  await auditFailure({
                    action: "auth.login_failed",
                    req,
                    reason: "invalid_credentials",
                  });
                  throw err.badCredentials();
                }

                const locked = lockDate(userRow.locked_until);
                if (locked && locked.getTime() <= Date.now()) {
                  userRow.failed_login_count = 0;
                  userRow.locked_until = null;
                  await db("users").where({ id: userRow.id }).update({
                    failed_login_count: 0,
                    locked_until: null,
                    updated_at: db.fn.now(),
                  });
                }
                if (locked && locked.getTime() > Date.now()) {
                  noteRateFailure(rateKey);
                  await auditFailure({
                    action: "auth.login_failed",
                    req,
                    accountId: userRow.account_id,
                    branchId: userRow.branch_id,
                    userId: userRow.id,
                    reason: "account_locked",
                  });
                  throw err.locked({ locked_until: locked.toISOString() });
                }

                if (!bcrypt.compareSync(body.data.password, userRow.password_hash)) {
                  const failedCount = Number(userRow.failed_login_count ?? 0) + 1;
                  const shouldLock = failedCount >= lockThreshold();
                  const lockedUntil = shouldLock ? new Date(Date.now() + lockWindowMs()) : null;

                  await db("users").where({ id: userRow.id }).update({
                    failed_login_count: failedCount,
                    locked_until: lockedUntil,
                    updated_at: db.fn.now(),
                  });
                  noteRateFailure(rateKey);
                  await auditFailure({
                    action: "auth.login_failed",
                    req,
                    accountId: userRow.account_id,
                    branchId: userRow.branch_id,
                    userId: userRow.id,
                    reason: shouldLock ? "lockout_threshold" : "invalid_credentials",
                  });

                  if (shouldLock) throw err.locked({ locked_until: lockedUntil!.toISOString() });
                  throw err.badCredentials();
                }

                await db("users").where({ id: userRow.id }).update({
                  failed_login_count: 0,
                  locked_until: null,
                  updated_at: db.fn.now(),
                });
                clearRateFailures(rateKey);

                const user = await loadUser(db, userRow.id);
                if (!user) throw err.badCredentials();
                const token = signUserToken(user);
                await writeAudit(db, {
                  accountId: user.accountId,
                  branchId: user.branchId,
                  userId: user.id,
                  action: "auth.login",
                  ip: req.ip,
                });
                res.json({ token, user, message: ar.messages.login_ok });
              } catch (error) {
                next(error);
              }
            });

            router.post("/pin-login", async (req, res, next) => {
              try {
                const body = z
                  .object({ branch_id: z.string().uuid(), pin: z.string().min(4).max(8) })
                  .safeParse(req.body);
                if (!body.success) throw err.validation(body.error.flatten());

                const rateKey = `pin:${req.ip}:${body.data.branch_id}`;
                assertRateAllowed(rateKey);

                const branch = await db("branches")
                  .where({ id: body.data.branch_id, is_active: true })
                  .select("id", "account_id")
                  .first();

                const candidates = branch
                  ? await db("users")
                      .where({ branch_id: branch.id, is_active: true })
                      .whereNotNull("pin_hash")
                  : [];
                const match = candidates.find((candidate) =>
                  bcrypt.compareSync(body.data.pin, candidate.pin_hash)
                );

                if (!match) {
                  noteRateFailure(rateKey);
                  await auditFailure({
                    action: "auth.pin_failed",
                    req,
                    accountId: branch?.account_id ?? null,
                    branchId: branch?.id ?? null,
                    reason: "invalid_pin",
                  });
                  throw err.badPin();
                }

                const locked = lockDate(match.locked_until);
                if (locked && locked.getTime() > Date.now()) {
                  noteRateFailure(rateKey);
                  await auditFailure({
                    action: "auth.pin_failed",
                    req,
                    accountId: match.account_id,
                    branchId: match.branch_id,
                    userId: match.id,
                    reason: "account_locked",
                  });
                  throw err.locked({ locked_until: locked.toISOString() });
                }

                await db("users").where({ id: match.id }).update({
                  failed_login_count: 0,
                  locked_until: null,
                  updated_at: db.fn.now(),
                });
                clearRateFailures(rateKey);

                const user = await loadUser(db, match.id);
                if (!user) throw err.badPin();
                const token = signUserToken(user);
                await writeAudit(db, {
                  accountId: user.accountId,
                  branchId: user.branchId,
                  userId: user.id,
                  action: "auth.pin_login",
                  ip: req.ip,
                });
                res.json({ token, user, message: ar.messages.login_ok });
              } catch (error) {
                next(error);
              }
            });

            router.get("/me", requireUser(db), (req, res) => {
              res.json({ user: req.user });
            });

            return router;
          }
          EOF

          python <<'PY'
