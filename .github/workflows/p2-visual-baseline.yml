name: P2 Visual Baseline

on:
  pull_request:
    branches: [refactor/p2-maintainability]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ykms
          POSTGRES_PASSWORD: ykms
          POSTGRES_DB: ykms_visual
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ykms -d ykms_visual"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: development
      DATABASE_URL: postgres://ykms:ykms@127.0.0.1:5432/ykms_visual
      JWT_SECRET: p2-visual-baseline-only
      API_PORT: 3001
      CORS_ORIGIN: http://127.0.0.1:5173
      P2_WEB_ORIGIN: http://127.0.0.1:5173
      P2_API_ORIGIN: http://127.0.0.1:3001

    steps:
      - name: Checkout visual work branch
        uses: actions/checkout@v4
        with:
          ref: work/p2-visual-baseline

      - name: Check whether baseline already exists
        id: gate
        shell: bash
        run: |
          if test -f docs/engineering/visual-baseline/p2-before/manifest.json; then
            echo "capture=false" >> "$GITHUB_OUTPUT"
          else
            echo "capture=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.gate.outputs.capture == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install project dependencies
        if: steps.gate.outputs.capture == 'true'
        run: npm ci

      - name: Prepare database and capture seed credentials
        if: steps.gate.outputs.capture == 'true'
        shell: bash
        run: |
          npm run api:migrate
          npm run api:seed | tee /tmp/p2-seed.log
          owner_email="$(sed -n 's/^  owner email   : //p' /tmp/p2-seed.log | tail -1)"
          owner_password="$(sed -n 's/^  owner password: //p' /tmp/p2-seed.log | tail -1)"
          test -n "$owner_email"
          test -n "$owner_password"
          echo "::add-mask::$owner_password"
          echo "P2_OWNER_EMAIL=$owner_email" >> "$GITHUB_ENV"
          echo "P2_OWNER_PASSWORD=$owner_password" >> "$GITHUB_ENV"
          echo "P2_SOURCE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Install Chromium capture runtime
        if: steps.gate.outputs.capture == 'true'
        run: |
          npm install --no-save --package-lock=false playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Start API and Admin
        if: steps.gate.outputs.capture == 'true'
        shell: bash
        run: |
          nohup npm run api:dev > /tmp/p2-api.log 2>&1 &
          nohup npm --workspace @ykms/admin run dev -- --host 127.0.0.1 > /tmp/p2-admin.log 2>&1 &
          for attempt in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:3001/api/v1/health >/dev/null && curl -fsS http://127.0.0.1:5173 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/p2-api.log || true
          cat /tmp/p2-admin.log || true
          exit 1

      - name: Capture baseline pack
        if: steps.gate.outputs.capture == 'true'
        run: node scripts/p2-capture-visual-baseline.mjs

      - name: Commit baseline screenshots
        if: steps.gate.outputs.capture == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f docs/engineering/visual-baseline/p2-before/.capture-pending || true
          git add docs/engineering/visual-baseline/p2-before
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "docs(p2): capture visual baseline screenshots"
          git push origin HEAD:work/p2-visual-baseline

      - name: Upload baseline pack artifact
        if: ${{ always() && hashFiles('docs/engineering/visual-baseline/p2-before/*.png') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: p2-visual-baseline-pack
          path: docs/engineering/visual-baseline/p2-before

      - name: Upload diagnostics on failure
        if: failure() && steps.gate.outputs.capture == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: p2-visual-baseline-diagnostics
          path: |
            /tmp/p2-api.log
            /tmp/p2-admin.log
            docs/engineering/visual-baseline/p2-before
