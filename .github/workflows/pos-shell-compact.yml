name: Apply compact POS shell

on:
  push:
    branches: [refactor/pos-fast-rail]
    paths: [scripts/apply_pos_shell_compact.py]

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ykms
          POSTGRES_PASSWORD: ykms
          POSTGRES_DB: ykms_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ykms -d ykms_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_test
      TEST_DATABASE_URL: postgres://ykms:ykms@localhost:5432/ykms_test
      JWT_SECRET: ci-only-change-me
      API_PORT: 3001
      CORS_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/pos-fast-rail
          fetch-depth: 0
      - run: python scripts/apply_pos_shell_compact.py
      - run: rm scripts/apply_pos_shell_compact.py .github/workflows/pos-shell-compact.yml
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run api:test
      - run: npm run admin:build
      - name: Commit validated shell revision
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(pos): compact AppShell and cart controls"
          git push origin HEAD:refactor/pos-fast-rail
