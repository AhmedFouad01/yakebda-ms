name: Reconcile P1 with main

on:
  push:
    branches:
      - fix/p1-reliability
    paths:
      - .github/workflows/reconcile-p1.yml

permissions:
  contents: write

jobs:
  reconcile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout P1 branch
        uses: actions/checkout@v4
        with:
          ref: fix/p1-reliability
          fetch-depth: 0

      - name: Reconcile merged P0 ancestry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge -s ours origin/main -m "chore: reconcile P1 with merged P0"
          git rm .github/workflows/reconcile-p1.yml
          git commit -m "chore: remove temporary P1 reconciliation workflow"
          git push origin HEAD:fix/p1-reliability
